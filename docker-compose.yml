services:
  db:
    image: postgis/postgis:15-3.3
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ticker:
    build: ./tick-script
    depends_on:
      - db
      - backend
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pgdata:
